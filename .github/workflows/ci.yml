name: CI Workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  build: # Mainly for lint & typecheck
    strategy:
      fail-fast: false # See all OS results
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }} # Run job instances across the multiple OS in parallel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm # Built-in dependency caching for npm

      # Clean install dependencies from package-lock.json
      # Automatically removes existing node_modules beforehand
      # Better for automated environments than npm install
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test: # For unit tests
    strategy:
      fail-fast: false # See all OS results
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }} # Run job instances across the multiple OS in parallel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm # Built-in dependency caching for npm

      # Clean install dependencies from package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test # Test coverage >=90 is not enforced yet

  package:
    needs: [build, test]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: build:win
            artifact_name: batchgrade-windows
          - os: macos-latest
            build_script: build:mac
            artifact_name: batchgrade-macos
          - os: ubuntu-latest
            build_script: build:linux
            artifact_name: batchgrade-linux
    runs-on: ${{ matrix.os }}
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate build environment
        shell: bash
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ]; then
            echo "Missing Actions variable: VITE_SUPABASE_URL"
            exit 1
          fi

          if [ -z "${VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY}" ]; then
            echo "Missing Actions variable: VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Package desktop app
        run: npm run ${{ matrix.build_script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/**
          if-no-files-found: error

# Changed from ChatGPT:
#   - Replaced npm run dist with the actual scripts this repo has
#   - Added a build_script per OS
#   - Limited packaging to push so PRs don't spend time building installers
#   - Simplified artifact upload to dist/**, which is less brittle than extension lists
